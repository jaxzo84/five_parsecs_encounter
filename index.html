<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Five Parsecs from Home — Encounter Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d0f14;
  --surf:     #13161e;
  --surf2:    #1c2030;
  --border:   #2a3045;
  --border2:  #3a4560;
  --gold:     #d4a84b;
  --gold2:    #e8c06a;
  --red:      #c0392b;
  --teal:     #2e7d7a;
  --text:     #d8dce8;
  --text2:    #8a90a8;
  --text3:    #5a6080;
  --fh:       'Bebas Neue', sans-serif;
  --fb:       'Barlow', sans-serif;
  --fc:       'Barlow Condensed', sans-serif;
  --fm:       'Share Tech Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:.9rem;line-height:1.5;min-height:100vh}

/* HEADER */
#hdr{background:var(--surf);border-bottom:2px solid var(--gold);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo-t{font-family:var(--fh);font-size:2rem;color:var(--gold);letter-spacing:2px;line-height:1}
.logo-s{font-family:var(--fm);font-size:.62rem;color:var(--text3);letter-spacing:4px}
.hdr-btns{display:flex;gap:.5rem;flex-wrap:wrap}

/* LAYOUT */
#app{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 65px);overflow:hidden}
#sidebar{background:var(--surf);border-right:1px solid var(--border);overflow-y:auto;padding:1.5rem 1rem;display:flex;flex-direction:column;gap:1.5rem}
#main{overflow-y:auto;padding:1.5rem 2rem}

/* BUTTONS */
.btn{font-family:var(--fc);font-size:.82rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:.5rem 1.1rem;border:1px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-p{background:var(--gold);color:#0d0f14;border-color:var(--gold)}
.btn-p:hover{background:var(--gold2);color:#0d0f14}
.btn-sm{padding:.28rem .7rem;font-size:.72rem}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:hover{background:var(--red);color:#fff}
.btn-roll{background:linear-gradient(135deg,#1a3a30,#0d0f14);border:1px solid var(--gold);color:var(--gold);font-family:var(--fh);font-size:1rem;letter-spacing:3px;padding:.65rem 2rem;cursor:pointer;transition:all .2s;width:100%;margin-top:.5rem}
.btn-roll:hover{background:linear-gradient(135deg,#2a5a48,#1a3a30);box-shadow:0 0 18px rgba(212,168,75,.25)}

/* FORMS */
.sec-lbl{font-family:var(--fm);font-size:.62rem;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:.6rem}
.form-grp{display:flex;flex-direction:column;gap:3px;margin-bottom:.6rem}
label.fl{font-family:var(--fm);font-size:.58rem;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
select,input[type=number],input[type=text]{background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:var(--fb);font-size:.85rem;padding:.38rem .55rem;width:100%;transition:border-color .15s}
select:focus,input:focus{outline:none;border-color:var(--gold)}
select option{background:var(--surf)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}

/* RESULT PANELS */
.enc-panel{background:var(--surf);border:1px solid var(--border);margin-bottom:1rem}
.enc-title{font-family:var(--fh);font-size:1.1rem;color:var(--gold);letter-spacing:2px;padding:.75rem 1rem .5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.enc-body{padding:1rem}
.enc-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.enc-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}

/* STAT BLOCKS */
.stat-block{background:var(--bg);border:1px solid var(--border);padding:.75rem}
.stat-title{font-family:var(--fm);font-size:.6rem;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:.5rem}
.stat-val{font-family:var(--fh);font-size:1.5rem;color:var(--gold);letter-spacing:1px;line-height:1}
.stat-sub{font-family:var(--fm);font-size:.65rem;color:var(--text2);margin-top:2px}

/* ENEMY BLOCK */
.enemy-block{background:var(--bg);border:1px solid var(--border2);padding:1rem}
.enemy-name{font-family:var(--fh);font-size:1.4rem;color:var(--text);letter-spacing:2px}
.enemy-cat{font-family:var(--fm);font-size:.6rem;color:var(--teal);letter-spacing:2px;margin-bottom:.5rem}
.enemy-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:.4rem;margin:.6rem 0}
.es-box{background:var(--surf2);border:1px solid var(--border);padding:.4rem;text-align:center}
.es-lbl{font-family:var(--fm);font-size:.52rem;color:var(--text3);letter-spacing:1px}
.es-v{font-family:var(--fh);font-size:1.1rem;color:var(--gold)}
.enemy-special{font-family:var(--fm);font-size:.68rem;color:var(--text2);line-height:1.6;margin-top:.5rem;border-top:1px solid var(--border);padding-top:.5rem}
.special-rule{color:var(--gold2)}

/* BADGE/TAG */
.badge{display:inline-block;font-family:var(--fm);font-size:.58rem;letter-spacing:1px;padding:2px 7px;border:1px solid;margin-right:4px;margin-bottom:3px}
.badge-gold{border-color:rgba(212,168,75,.5);color:var(--gold)}
.badge-red{border-color:rgba(192,57,43,.5);color:#e07060}
.badge-teal{border-color:rgba(46,125,122,.5);color:#5ab8b4}
.badge-dim{border-color:var(--border);color:var(--text3)}

/* TABLES */
.data-table{width:100%;border-collapse:collapse;font-size:.82rem}
.data-table th{font-family:var(--fm);font-size:.58rem;color:var(--text3);letter-spacing:2px;text-align:left;padding:.3rem .5rem;border-bottom:1px solid var(--border);background:var(--bg)}
.data-table td{padding:.3rem .5rem;border-bottom:1px solid rgba(42,48,69,.4);vertical-align:top}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:nth-child(even) td{background:rgba(28,32,48,.5)}

/* OBJECTIVE CARD */
.obj-card{background:linear-gradient(135deg,rgba(46,125,122,.1),rgba(28,32,48,0));border:1px solid rgba(46,125,122,.3);padding:1rem}
.obj-name{font-family:var(--fh);font-size:1.4rem;color:#5ab8b4;letter-spacing:2px}
.obj-desc{font-size:.82rem;color:var(--text2);line-height:1.6;margin-top:.4rem}

/* NOTABLE SIGHT */
.sight-card{background:rgba(212,168,75,.05);border:1px solid rgba(212,168,75,.2);padding:.75rem}
.sight-name{font-family:var(--fc);font-size:.95rem;font-weight:700;color:var(--gold)}
.sight-desc{font-size:.8rem;color:var(--text2)}

/* DEPLOYMENT CARD */
.dep-card{background:rgba(192,57,43,.05);border:1px solid rgba(192,57,43,.2);padding:.75rem}
.dep-name{font-family:var(--fc);font-size:.95rem;font-weight:700;color:#e07060}
.dep-desc{font-size:.8rem;color:var(--text2)}

/* DIVIDER */
hr{border:none;border-top:1px solid var(--border);margin:.75rem 0}

/* EMPTY */
.empty{text-align:center;padding:4rem 1rem;color:var(--text3);font-family:var(--fm);font-size:.75rem;letter-spacing:2px}
.empty h2{font-family:var(--fh);font-size:2.5rem;color:var(--border2);letter-spacing:4px;margin-bottom:.5rem}

/* NARRATIVE */
.narrative{background:rgba(212,168,75,.04);border-left:3px solid var(--gold);padding:.75rem 1rem;font-family:var(--fb);font-size:.82rem;color:var(--text2);font-style:italic;line-height:1.7;margin-bottom:1rem}

/* UNIQUE INDIVIDUAL */
.ui-block{background:rgba(212,168,75,.06);border:1px solid rgba(212,168,75,.25);padding:.75rem 1rem;margin-top:.5rem}
.ui-name{font-family:var(--fh);font-size:1.1rem;color:var(--gold2);letter-spacing:2px}

/* SCROLL */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2)}

/* ANIM */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}

/* SECTION DIVIDER */
.sec-divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0 .75rem}
.sec-divider span{font-family:var(--fh);font-size:.85rem;color:var(--text3);letter-spacing:3px;white-space:nowrap}
.sec-divider::before,.sec-divider::after{content:'';flex:1;border-top:1px solid var(--border)}

/* PRINT */
@media print{
  #hdr{display:none}
  #app{display:block;height:auto;overflow:visible}
  #sidebar{display:none}
  #main{padding:0;overflow:visible}
  .btn,.btn-roll,.btn-p{display:none}
  .enc-panel{break-inside:avoid;border:1px solid #444;margin-bottom:12pt;background:#fff;color:#000}
  .enc-title{color:#000;background:#eee;border-bottom:1px solid #888}
  .enemy-name,.stat-val,.es-v,.obj-name{color:#000}
  .es-box,.stat-block,.enemy-block,.obj-card,.dep-card,.sight-card,.ui-block{background:#f5f5f5;border-color:#999}
  .enemy-special,.stat-sub,.es-lbl,.enemy-cat,.obj-desc,.dep-desc,.sight-desc{color:#444}
  .badge{color:#333;border-color:#999}
  .narrative{background:#f9f9f9;border-left:3px solid #aaa;color:#555}
  .sec-divider{display:none}
}
</style>
</head>
<body>
<header id="hdr">
  <div>
    <div class="logo-t">Five Parsecs from Home</div>
    <div class="logo-s">Encounter Generator — Third Edition</div>
  </div>
  <div class="hdr-btns">
    <button class="btn" onclick="window.print()">🖨 Print PDF</button>
    <button class="btn btn-sm" onclick="exportTXT()">Export TXT</button>
  </div>
</header>

<div id="app">
  <aside id="sidebar">
    <div>
      <div class="sec-lbl">Mission Settings</div>
      <div class="form-grp">
        <label class="fl">Mission Type</label>
        <select id="inp-mission">
          <option value="opportunity">Opportunity</option>
          <option value="patron">Patron</option>
          <option value="rival">Rival Attack</option>
          <option value="quest">Quest</option>
          <option value="invasion">Invasion Battle</option>
        </select>
      </div>
      <div class="form-grp">
        <label class="fl">Crew Size in Field</label>
        <select id="inp-crewsize">
          <option value="6">6 (Standard — Roll 2D6, pick highest)</option>
          <option value="5">5 (Roll 1D6)</option>
          <option value="4">4 (Roll 2D6, pick lowest)</option>
        </select>
      </div>
      <div class="form-grp">
        <label class="fl">Difficulty Mode</label>
        <select id="inp-diff">
          <option value="normal">Normal</option>
          <option value="easy">Easy</option>
          <option value="challenging">Challenging</option>
          <option value="hardcore">Hardcore</option>
          <option value="insanity">Insanity</option>
        </select>
      </div>
    </div>

    <div>
      <div class="sec-lbl">Enemy Options</div>
      <div class="form-grp">
        <label class="fl">Enemy Category</label>
        <select id="inp-ecat">
          <option value="auto">Auto (roll D100)</option>
          <option value="criminal">Criminal Elements</option>
          <option value="hired">Hired Muscle</option>
          <option value="interested">Interested Parties</option>
          <option value="roving">Roving Threats</option>
        </select>
      </div>
      <div class="form-grp">
        <label class="fl">Specific Enemy Type</label>
        <select id="inp-etype">
          <option value="auto">Auto (roll on subtable)</option>
        </select>
      </div>
    </div>

    <div>
      <div class="sec-lbl">Patron Details (optional)</div>
      <div class="form-grp">
        <label class="fl">Patron Type</label>
        <select id="inp-patron">
          <option value="">None / Unknown</option>
          <option value="corporation">Corporation (+1 Danger Pay)</option>
          <option value="local_gov">Local Government</option>
          <option value="sector_gov">Sector Government</option>
          <option value="wealthy">Wealthy Individual</option>
          <option value="private">Private Organization</option>
          <option value="secretive">Secretive Group (+1 Time Frame)</option>
        </select>
      </div>
    </div>

    <div>
      <div class="sec-lbl">Rival Info (if applicable)</div>
      <div class="form-grp">
        <label class="fl">Is Known Rival?</label>
        <select id="inp-rivalknown">
          <option value="no">No (generate random)</option>
          <option value="yes">Yes (tracked down — Showdown)</option>
        </select>
      </div>
    </div>

    <div>
      <div class="sec-lbl">Table Size</div>
      <div class="form-grp">
        <label class="fl">Battlefield Size</label>
        <select id="inp-table">
          <option value="2x2">2 × 2 feet</option>
          <option value="2.5x2.5" selected>2.5 × 2.5 feet</option>
          <option value="3x3">3 × 3 feet</option>
        </select>
      </div>
    </div>

    <button class="btn-roll" onclick="generate()">⚄ GENERATE ENCOUNTER</button>
  </aside>

  <main id="main">
    <div id="result" class="empty">
      <h2>STAND BY</h2>
      <p>Configure your mission settings and hit Generate.</p>
    </div>
  </main>
</div>

const PATRON_BHC_THRESH  = {corporation:{ben:8,haz:8,con:5},local_gov:{ben:8,haz:8,con:8},sector_gov:{ben:8,haz:8,con:8},wealthy:{ben:5,haz:8,con:8},private:{ben:8,haz:8,con:8},secretive:{ben:8,haz:5,con:8}};

// ═══════════════════════════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════════════════════════
function d(n){return Math.floor(Math.random()*n)+1}
function roll(table){const v=d(100);return table.find(e=>v>=e.r[0]&&v<=e.r[1])||table[table.length-1]}
function rollD10(table){const v=d(10);return table.find(e=>v>=e.r[0]&&v<=e.r[1])||table[table.length-1]}
function rollEnemyD100(table){const v=d(100);return table.find(e=>v>=e.r[0]&&v<=e.r[1])||table[table.length-1]}
function rollD6x2high(){return Math.max(d(6),d(6))}
function rollD6(){return d(6)}
function rollD6x2low(){return Math.min(d(6),d(6))}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// populate enemy type dropdown
function updateEnemyTypeDropdown(cat){
  const sel=document.getElementById('inp-etype');
  sel.innerHTML='<option value="auto">Auto (roll on subtable)</option>';
  if(cat==='auto'||!ENEMIES[cat])return;
  ENEMIES[cat].forEach((e,i)=>sel.innerHTML+=`<option value="${i}">${e.name}</option>`);
}
document.getElementById('inp-ecat').addEventListener('change',e=>updateEnemyTypeDropdown(e.target.value));

// ═══════════════════════════════════════════════════════════════════
// GENERATE
// ═══════════════════════════════════════════════════════════════════
let lastResult = null;

function generate(){
  const mission   = document.getElementById('inp-mission').value;
  const crewSize  = +document.getElementById('inp-crewsize').value;
  const diff      = document.getElementById('inp-diff').value;
  const eCatInput = document.getElementById('inp-ecat').value;
  const eTypeInput= document.getElementById('inp-etype').value;
  const patronType= document.getElementById('inp-patron').value;
  const rivalKnown= document.getElementById('inp-rivalknown').value;
  const tableSize = document.getElementById('inp-table').value;

  // --- STEP 1: Enemy category
  let catName;
  if(eCatInput==='auto'){
    const missionForCat = mission==='invasion' ? 'invasion' : mission;
    const catTable = ENEMY_CATEGORIES[missionForCat] || ENEMY_CATEGORIES.opportunity;
    catName = roll(catTable).name;
  } else {
    catName = eCatInput;
  }

  // --- STEP 2: Enemy type
  let enemy;
  const enemyTable = ENEMIES[catName] || ENEMIES.criminal;
  if(eTypeInput!=='auto'){
    enemy = enemyTable[+eTypeInput] || rollEnemyD100(enemyTable);
  } else {
    enemy = rollEnemyD100(enemyTable);
  }

  // --- STEP 3: Number of opponents
  let baseRoll;
  if(crewSize===6){baseRoll=rollD6x2high();}
  else if(crewSize===5){baseRoll=rollD6();}
  else{baseRoll=rollD6x2low();}

  // Difficulty adjustments
  if(diff==='challenging'||diff==='hardcore'||diff==='insanity'){
    // reroll 1s and 2s on each die before picking for crew of 6
  }

  const numMod = parseInt(enemy.numbers)||0;
  let numOpponents = baseRoll + numMod;

  // Quest final battle
  const isFinalQuest = mission==='quest';
  if(isFinalQuest && eTypeInput==='auto') numOpponents += 1;

  if(diff==='easy' && numOpponents>=5) numOpponents -= 1;
  if(diff==='hardcore'||diff==='insanity') numOpponents += 1;
  if(mission==='invasion') numOpponents += 2;
  numOpponents = Math.max(1, numOpponents);

  // Specialists
  let specialists=0;
  if(numOpponents<=2) specialists=0;
  else if(numOpponents<=6) specialists=1;
  else specialists=2;
  if(diff==='insanity') specialists++;

  // Lieutenant
  const hasLieutenant = numOpponents>=4;

  // Unique Individual
  let uiRoll2d6 = d(6)+d(6);
  if(catName==='interested') uiRoll2d6 += 1;
  if(diff==='hardcore') uiRoll2d6 += 1;
  const hasUI = (diff==='insanity') || (catName!=='roving' && uiRoll2d6>=9);
  let ui = null;
  if(hasUI){
    const uiTable = UNIQUE_INDIVIDUALS;
    const uiRoll = d(100);
    ui = uiTable.find(e=>uiRoll>=e.r[0]&&uiRoll<=e.r[1])||uiTable[uiTable.length-1];
  }

  // --- STEP 4: Weapons
  const wpnCode = enemy.wpn || '1A';
  let mainWpnNum, specWpnLetter;
  if(/^\d/.test(wpnCode)){
    const parts = wpnCode.match(/(\d+)([A-Z]+)?/);
    mainWpnNum = parseInt(parts[1])||1;
    specWpnLetter = parts[2]||'A';
  } else {
    mainWpnNum = null; specWpnLetter = null;
  }
  let mainWeapon='', specWeapon='';
  if(mainWpnNum && WEAPONS_MAIN[mainWpnNum]){
    mainWeapon = WEAPONS_MAIN[mainWpnNum][d(6)-1]||WEAPONS_MAIN[mainWpnNum][0];
  } else {
    mainWeapon = wpnCode; specWpnLetter=null;
  }
  if(specWpnLetter && WEAPONS_SPEC[specWpnLetter]){
    specWeapon = WEAPONS_SPEC[specWpnLetter][d(6)-1]||WEAPONS_SPEC[specWpnLetter][0];
  }
  // Aggressive AI with combat skill gets Blade
  const aggressiveBlade = (enemy.ai==='A' && enemy.combat!=='+0') ? ' + Blade' : '';
  const psychoBlade = enemy.ai==='R' ? ' + Blade' : '';

  // --- STEP 5: Deployment Conditions
  let depKey;
  if(mission==='rival') depKey='rival';
  else if(mission==='quest') depKey='quest';
  else depKey='opportunity/patron';
  const depTable = DEPLOYMENT[depKey]||DEPLOYMENT['opportunity/patron'];
  const depCondition = (mission==='invasion') ? {name:'Invasion',desc:'Survive 6 rounds. No Win condition. Any figure leaving before Round 6 becomes a casualty. Opponents have +2 to numbers.'} : roll(depTable);

  // --- STEP 6: Notable Sights
  let sightKey;
  if(mission==='rival') sightKey='rival';
  else if(mission==='quest') sightKey='quest';
  else sightKey='opportunity/patron';
  const sightTable = NOTABLE_SIGHTS[sightKey]||NOTABLE_SIGHTS['opportunity/patron'];
  const sight = (mission==='invasion') ? {name:'Invasion — No Notable Sight',desc:''} : roll(sightTable);

  // --- STEP 7: Objective
  let objective=null, rivalAttack=null;
  if(mission==='rival'){
    if(rivalKnown==='yes'){
      rivalAttack={name:'Showdown',desc:'A straight-up fight. No modifications. You tracked them down.'};
    } else {
      rivalAttack = rollD10(RIVAL_ATTACKS);
    }
  } else if(mission==='invasion'){
    objective={name:'Survive',desc:'Hold out for 6 rounds, then flee or fight until you Hold the Field.'};
  } else {
    const objKey = (mission==='patron') ? 'patron' : (mission==='quest') ? 'quest' : 'opportunity';
    const objTable = OBJECTIVES[objKey]||OBJECTIVES.opportunity;
    objective = rollD10(objTable);
  }

  // --- STEP 8: Patron job details (if patron)
  let patronDetails = null;
  if(mission==='patron' && patronType){
    const thresholds = PATRON_BHC_THRESH[patronType]||PATRON_BHC_THRESH.local_gov;
    const dpRoll = d(10) + (patronType==='corporation'?1:0);
    const dangerPay = PATRON_DANGER_PAY.find(e=>dpRoll>=e.r[0]&&dpRoll<=e.r[1])||PATRON_DANGER_PAY[0];

    const timeRoll = d(10) + (patronType==='secretive'?1:0);
    const timeFrame = timeRoll<=5 ? 'This campaign turn' : timeRoll<=7 ? 'This or the next campaign turn' : timeRoll<=9 ? 'This or the following 2 turns' : 'Any time';

    const benRoll=d(10), hazRoll=d(10), conRoll=d(10);
    const benefit   = benRoll>=thresholds.ben ? rollD10(PATRON_BENEFITS)   : null;
    const hazard    = hazRoll>=thresholds.haz ? rollD10(PATRON_HAZARDS)    : null;
    const condition = conRoll>=thresholds.con ? rollD10(PATRON_CONDITIONS) : null;

    patronDetails={dangerPay,timeFrame,benefit,hazard,condition};
  }

  // --- STEP 9: Terrain
  const terrain = TERRAIN_SETS[tableSize]||TERRAIN_SETS['2.5x2.5'];
  const aiData  = AI_RULES[enemy.ai]||{name:'?',short:'—'};

  // Build narrative
  const catDisplay = {criminal:'Criminal Elements',hired:'Hired Muscle',interested:'Interested Parties',roving:'Roving Threats'}[catName]||catName;

  lastResult = {mission,crewSize,diff,catName,catDisplay,enemy,numOpponents,specialists,hasLieutenant,ui,mainWeapon,specWeapon,aggressiveBlade,psychoBlade,depCondition,sight,objective,rivalAttack,patronDetails,terrain,tableSize,aiData,wpnCode,mainWpnNum,specWpnLetter};

  renderResult(lastResult);
}

    `  AI:           ${r.aiData.name} (${r.enemy.ai})   Panic: ${r.enemy.panic}`,
    `  Opponents:    ${r.numOpponents} total (${r.specialists} Specialist${r.specialists!==1?'s':''})`,
    `  Lieutenant:   ${r.hasLieutenant ? 'Present (+1 CS, Blade, Fearless)' : 'Absent'}`,
    `  Weapon code:  ${r.wpnCode}`,
    `  Main weapon:  ${r.mainWeapon}${r.aggressiveBlade||r.psychoBlade}`,
    r.specialists>0&&r.specWeapon ? `  Spec weapon:  ${r.specWeapon}` : '',
    '',
    '  SPECIAL RULES',
    ...(r.enemy.special||'').split('\n').map(l=>`  ${l}`),
  ];
  if(r.ui){
    lines.push('','  UNIQUE INDIVIDUAL',thin,
      `  ${r.ui.name}`,
      `  Speed: ${r.ui.speed}   Combat: ${r.ui.combat}   Toughness: ${r.ui.tough}   AI: ${r.ui.ai}   Luck: ${r.ui.luck}`,
      `  Weapon: ${r.ui.wpn}`,
      ...(r.ui.special||'').split('\n').map(l=>`  ${l}`));
  }
  lines.push('','  MISSION SETUP',thin);
  if(r.objective) lines.push(`  Objective:    ${r.objective.name}`,`                ${r.objective.desc}`);
  if(r.rivalAttack) lines.push(`  Rival Attack: ${r.rivalAttack.name}`,`                ${r.rivalAttack.desc}`);
  lines.push(`  Deploy Cond:  ${r.depCondition.name}`,r.depCondition.desc?`                ${r.depCondition.desc}`:'');
  lines.push(`  Notable Sight:${r.sight.name}`,r.sight.desc?`                ${r.sight.desc}`:'');
  lines.push('','  TERRAIN',`  Large: ${r.terrain.large}   Small: ${r.terrain.small}   Linear: ${r.terrain.linear}`);
  if(r.patronDetails){
    const pd=r.patronDetails;
    lines.push('','  PATRON JOB DETAILS',thin,
      `  Danger Pay:   ${pd.dangerPay.val}`,
      `  Time Frame:   ${pd.timeFrame}`,
      pd.benefit  ? `  Benefit:      ${pd.benefit.name} — ${pd.benefit.effect}` : '  Benefit:      None',
      pd.hazard   ? `  Hazard:       ${pd.hazard.name} — ${pd.hazard.effect}` : '  Hazard:       None',
      pd.condition? `  Condition:    ${pd.condition.name} — ${pd.condition.effect}` : '  Condition:    None',
    );
  }
  lines.push('','  SEIZE THE INITIATIVE','  Roll 2D6 + highest Savvy. 10+ = crew acts before Round 1 (shots hit on natural 6 only).');
  lines.push('','  MORALE',`  Enemy Panic Range: ${r.enemy.panic}. Roll 1D6 per casualty each round. Dice within range = Bail (from closest to their edge).`);
  lines.push('',sep);

  const blob=new Blob([lines.filter(l=>l!==undefined).join('\n')],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='encounter_'+r.enemy.name.replace(/[^a-z0-9]/gi,'_').toLowerCase()+'.txt';
  a.click();
}
</script>
</body>
</html>
